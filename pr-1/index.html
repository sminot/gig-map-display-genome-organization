<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pangenome Viewer</title>
    <link rel="stylesheet" href="style.css" />

    <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5/papaparse.min.js"></script>
  </head>

  <body>
    <div class="app-layout">

      <!-- ── Left Sidebar ─────────────────────────────────────────────── -->
      <aside class="sidebar" aria-label="Controls">

        <header class="sidebar-header">
          <h1 class="app-title">Pangenome Viewer</h1>
        </header>

        <!-- Drop zone -->
        <section class="upload-section" aria-label="File upload">
          <div
            id="drop-zone"
            class="drop-zone"
            role="button"
            tabindex="0"
            aria-label="Drop zone: drop genomes.aln.csv.gz here or press Enter to open file picker"
          >
            <svg class="drop-icon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5" />
            </svg>
            <p class="drop-primary">Drop <code>genomes.aln.csv.gz</code> here</p>
            <p class="drop-secondary">or click to browse</p>
            <input
              type="file"
              id="file-input"
              accept=".gz,.csv"
              aria-hidden="true"
              tabindex="-1"
            />
          </div>
        </section>

        <!-- Loading indicator (hidden by default) -->
        <div id="loading-indicator" class="loading-indicator" aria-live="polite" aria-busy="true" hidden>
          <span class="spinner" aria-hidden="true"></span>
          <span class="loading-text">Parsing&hellip;</span>
        </div>

        <!-- Error message (hidden by default) -->
        <div id="error-message" class="error-message" role="alert" aria-live="assertive" hidden></div>

        <!-- Controls panel (hidden by default, shown after file loaded) -->
        <div id="controls-panel" class="controls-panel" hidden>

          <!-- Reference Genome section -->
          <section class="control-section" aria-labelledby="ref-section-heading">
            <h2 class="control-section-heading" id="ref-section-heading">Reference Genome</h2>
            <div class="control-field">
              <label for="reference-select" class="visually-hidden">Select reference genome</label>
              <select id="reference-select" class="select-control" aria-label="Reference genome">
                <!-- populated by controls.js -->
              </select>
            </div>
          </section>

          <!-- Genomes section -->
          <section class="control-section" aria-labelledby="genomes-section-heading">
            <h2 class="control-section-heading" id="genomes-section-heading">Genomes</h2>
            <div id="genome-toggles" class="genome-toggles" role="group" aria-label="Toggle genomes">
              <!-- checkboxes populated by controls.js -->
            </div>
          </section>

          <!-- Gene Annotation section -->
          <section class="control-section" aria-labelledby="annot-section-heading">
            <h2 class="control-section-heading" id="annot-section-heading">Gene Annotation</h2>

            <!-- Compact upload zone -->
            <div
              id="annotation-drop-zone"
              class="drop-zone-compact"
              role="button"
              tabindex="0"
              aria-label="Drop zone: drop gene annotation CSV here or press Enter to browse"
            >
              <span class="drop-zone-compact-text">
                Drop CSV / TSV&nbsp;&nbsp;<span id="annotation-file-label" class="upload-file-label"></span>
              </span>
              <input
                type="file"
                id="annotation-file-input"
                accept=".csv,.tsv,.txt,.gz"
                aria-hidden="true"
                tabindex="-1"
              />
            </div>

            <div id="annotation-error" class="error-message" role="alert" hidden></div>

            <!-- Column selector + clear (shown once file loaded) -->
            <div id="annotation-controls" class="annotation-controls" hidden>
              <div class="control-row">
                <label for="annotation-column-select" class="control-label">Column</label>
                <select id="annotation-column-select" class="select-control select-control-sm">
                  <option value="">— none —</option>
                </select>
              </div>
              <button id="clear-annotation-btn" class="btn-text-danger" type="button">Clear</button>
            </div>

            <!-- Legend -->
            <div id="annotation-legend" class="legend-container"></div>
          </section>

          <!-- Genome Annotation section -->
          <section class="control-section" aria-labelledby="genome-annot-section-heading">
            <h2 class="control-section-heading" id="genome-annot-section-heading">Genome Annotation</h2>

            <!-- Compact upload zone -->
            <div
              id="genome-annotation-drop-zone"
              class="drop-zone-compact"
              role="button"
              tabindex="0"
              aria-label="Drop zone: drop genome annotation CSV here or press Enter to browse"
            >
              <span class="drop-zone-compact-text">
                Drop CSV / TSV&nbsp;&nbsp;<span id="genome-annotation-file-label" class="upload-file-label"></span>
              </span>
              <input
                type="file"
                id="genome-annotation-file-input"
                accept=".csv,.tsv,.txt,.gz"
                aria-hidden="true"
                tabindex="-1"
              />
            </div>

            <div id="genome-annotation-error" class="error-message" role="alert" hidden></div>

            <!-- Column selectors + palette + clear (shown once file loaded) -->
            <div id="genome-annotation-controls" class="annotation-controls" hidden>
              <div class="control-row">
                <label for="genome-color-column-select" class="control-label">Color by</label>
                <select id="genome-color-column-select" class="select-control select-control-sm">
                  <option value="">— none —</option>
                </select>
              </div>
              <div class="control-row">
                <label for="genome-palette-select" class="control-label">Palette</label>
                <select id="genome-palette-select" class="select-control select-control-sm">
                  <option value="Tableau10">Tableau10</option>
                  <option value="Set1">Set1</option>
                  <option value="Set2">Set2</option>
                  <option value="Set3">Set3</option>
                  <option value="Pastel1">Pastel1</option>
                  <option value="Dark2">Dark2</option>
                  <option value="Paired">Paired</option>
                  <option value="Accent">Accent</option>
                </select>
              </div>
              <div class="control-row">
                <label for="genome-sort-column-select" class="control-label">Sort by</label>
                <select id="genome-sort-column-select" class="select-control select-control-sm">
                  <option value="">— none —</option>
                </select>
              </div>
              <div class="control-row">
                <label for="genome-sort-order-select" class="control-label">Order</label>
                <select id="genome-sort-order-select" class="select-control select-control-sm">
                  <option value="asc">Ascending</option>
                  <option value="desc">Descending</option>
                </select>
              </div>
              <button id="clear-genome-annotation-btn" class="btn-text-danger" type="button">Clear</button>
            </div>

            <!-- Legend -->
            <div id="genome-annotation-legend" class="legend-container"></div>
          </section>

          <!-- Zoom section -->
          <section class="control-section" aria-labelledby="zoom-section-heading">
            <h2 class="control-section-heading" id="zoom-section-heading">Zoom</h2>
            <div class="control-row">
              <label for="wedge-span-input" class="control-label">Wedge</label>
              <input
                type="range"
                id="wedge-span-input"
                class="range-control"
                min="10"
                max="50"
                value="33"
                step="1"
                aria-label="Zoom wedge size as percent of full circle"
              />
              <span id="wedge-span-display" class="range-display">33%</span>
            </div>
            <button id="reset-zoom-btn" class="btn-export" type="button" style="width:100%;margin-top:4px">Reset Zoom</button>
            <p class="control-hint">Hover over the circle and scroll to zoom in. The wedge shows the zoomed region.</p>
          </section>

          <!-- Export section -->
          <section class="control-section" aria-labelledby="export-section-heading">
            <h2 class="control-section-heading" id="export-section-heading">Export</h2>
            <div class="export-buttons">
              <button id="export-png-btn" class="btn-export" type="button">PNG</button>
              <button id="export-pdf-btn" class="btn-export" type="button">PDF</button>
              <button id="export-html-btn" class="btn-export" type="button">HTML</button>
            </div>
          </section>

        </div>
        <!-- /#controls-panel -->

      </aside>
      <!-- /.sidebar -->

      <!-- ── Main Visualization Area ──────────────────────────────────── -->
      <main class="main-area" aria-label="Visualization">
        <div id="viz-container" class="viz-container">
          <canvas id="main-canvas" aria-label="Pangenome circular visualization"></canvas>
          <svg id="overlay-svg" aria-hidden="true"></svg>
        </div>

        <!-- Tooltip (hidden by default, positioned by JS) -->
        <div id="tooltip" class="tooltip" role="tooltip" aria-hidden="true"></div>
      </main>

    </div>
    <!-- /.app-layout -->

    <!-- Scripts loaded in dependency order -->
    <script src="data-contract.js"></script>
    <script src="app.js"></script>
    <script src="genome-viz.js"></script>
    <script src="zoom-state.js"></script>
    <script src="webgl-renderer.js"></script>
    <script src="zoom-interaction.js"></script>
    <script src="annotation.js"></script>
    <script src="genome-annotation.js"></script>
    <script src="export.js"></script>
    <script src="controls.js"></script>
  </body>
</html>
